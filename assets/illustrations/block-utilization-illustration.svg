<svg width="1280" height="740" viewBox="60 70 1280 740" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="110" y1="80" x2="1280" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F2EB"/>
      <stop offset="0.58" stop-color="#F8F7F2"/>
      <stop offset="1" stop-color="#EAF1F8"/>
    </linearGradient>
    <linearGradient id="panel" x1="150" y1="150" x2="1250" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F6F7"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="900" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#132024" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="160" cy="160" r="120" fill="#E9DDD2"/>
  <circle cx="1230" cy="180" r="150" fill="#DCE8F7"/>
  <circle cx="1180" cy="760" r="170" fill="#E0F0E8"/>

  <g filter="url(#shadow)">
    <rect x="128" y="128" width="1144" height="644" rx="36" fill="url(#panel)"/>
    <rect x="128" y="128" width="1144" height="644" rx="36" stroke="#D6E2E5" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="184" y="204" fill="#203136" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Block utilization</text>
  <text x="184" y="238" fill="#617A80" font-size="18" font-family="Arial, Helvetica, sans-serif">
    <tspan x="184" dy="0">How effectively allocated surgical block time</tspan>
    <tspan x="184" dy="20">is being used across service lines.</tspan>
  </text>

  <!-- Stat cards -->
  <g>
    <rect x="184" y="284" width="220" height="110" rx="24" fill="#EEF7F6"/>
    <text x="216" y="324" fill="#4A7076" font-size="17" font-family="Arial, Helvetica, sans-serif">Overall block util</text>
    <text x="216" y="372" fill="#1E3136" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">65.5%</text>
  </g>
  <g>
    <rect x="426" y="284" width="220" height="110" rx="24" fill="#FFF7F4"/>
    <text x="458" y="324" fill="#906154" font-size="17" font-family="Arial, Helvetica, sans-serif">Total block hours</text>
    <text x="458" y="372" fill="#1E3136" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">1,330</text>
  </g>
  <g>
    <rect x="668" y="284" width="220" height="110" rx="24" fill="#EEF3FF"/>
    <text x="700" y="324" fill="#4B66A1" font-size="17" font-family="Arial, Helvetica, sans-serif">Total used hours</text>
    <text x="700" y="372" fill="#1E3136" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">871</text>
  </g>
  <g>
    <rect x="910" y="284" width="220" height="110" rx="24" fill="#F3EEF9"/>
    <text x="942" y="324" fill="#6A5B8A" font-size="17" font-family="Arial, Helvetica, sans-serif">Blocks, no cases</text>
    <text x="942" y="372" fill="#1E3136" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">0</text>
  </g>

  <!-- Multi-line trend chart panel -->
  <g>
    <rect x="184" y="434" width="700" height="296" rx="30" fill="#FCFDFD"/>
    <text x="220" y="480" fill="#223438" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Utilization by service block</text>

    <!-- Target line at 75% -->
    <line x1="226" y1="524" x2="840" y2="524" stroke="#8ED9CE" stroke-width="2" stroke-dasharray="8 6" opacity="0.7"/>
    <text x="846" y="528" fill="#8ED9CE" font-size="13" font-family="Arial, Helvetica, sans-serif">Target</text>

    <!-- Anderson Urology Block — blue -->
    <polyline points="260,540 328,534 396,548 464,530 532,538 600,526 668,544 736,528" fill="none" stroke="#4E90FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="736" cy="528" r="6" fill="#4E90FF"/>

    <!-- Brown Ortho Block — coral/salmon -->
    <polyline points="260,568 328,560 396,572 464,558 532,564 600,554 668,570 736,556" fill="none" stroke="#F28E79" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="736" cy="556" r="6" fill="#F28E79"/>

    <!-- Johnson Cardiac Block — teal -->
    <polyline points="260,546 328,552 396,538 464,544 532,536 600,548 668,532 736,540" fill="none" stroke="#8ED9CE" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="736" cy="540" r="6" fill="#8ED9CE"/>

    <!-- General Surgery Block — orange -->
    <polyline points="260,590 328,600 396,594 464,608 532,596 600,612 668,602 736,610" fill="none" stroke="#F4C86A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="736" cy="610" r="6" fill="#F4C86A"/>

    <!-- Garcia Gen Surgery Block — green -->
    <polyline points="260,624 328,638 396,630 464,642 532,634 600,648 668,636 736,644" fill="none" stroke="#6BBF8A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="736" cy="644" r="6" fill="#6BBF8A"/>

    <!-- Overall — dark dashed -->
    <polyline points="260,572 328,578 396,570 464,576 532,568 600,580 668,574 736,576" fill="none" stroke="#203136" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="10 6"/>
    <circle cx="736" cy="576" r="5" fill="#203136"/>

    <!-- X axis -->
    <line x1="226" y1="668" x2="760" y2="668" stroke="#D6E2E5" stroke-width="3" stroke-linecap="round"/>
    <text x="244" y="694" fill="#70878D" font-size="14" font-family="Arial, Helvetica, sans-serif">Feb 3</text>
    <text x="380" y="694" fill="#70878D" font-size="14" font-family="Arial, Helvetica, sans-serif">Feb 10</text>
    <text x="516" y="694" fill="#70878D" font-size="14" font-family="Arial, Helvetica, sans-serif">Feb 17</text>
    <text x="652" y="694" fill="#70878D" font-size="14" font-family="Arial, Helvetica, sans-serif">Feb 24</text>
  </g>

  <!-- Service block legend / dark panel -->
  <g>
    <rect x="912" y="434" width="292" height="296" rx="30" fill="#192629"/>
    <text x="946" y="480" fill="#EEF4F4" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Service blocks</text>

    <!-- Anderson Urology -->
    <g>
      <rect x="946" y="510" width="118" height="14" rx="7" fill="#31464B"/>
      <rect x="946" y="510" width="86" height="14" rx="7" fill="#4E90FF"/>
      <text x="946" y="548" fill="#A7C0BC" font-size="16" font-family="Arial, Helvetica, sans-serif">Urology  72.8%</text>
    </g>

    <!-- Brown Ortho -->
    <g>
      <rect x="946" y="568" width="118" height="14" rx="7" fill="#31464B"/>
      <rect x="946" y="568" width="64" height="14" rx="7" fill="#F28E79"/>
      <text x="946" y="606" fill="#A7C0BC" font-size="16" font-family="Arial, Helvetica, sans-serif">Ortho  53.2%</text>
    </g>

    <!-- Johnson Cardiac -->
    <g>
      <rect x="946" y="626" width="118" height="14" rx="7" fill="#31464B"/>
      <rect x="946" y="626" width="88" height="14" rx="7" fill="#8ED9CE"/>
      <text x="946" y="664" fill="#A7C0BC" font-size="16" font-family="Arial, Helvetica, sans-serif">Cardiac  73.2%</text>
    </g>

    <!-- General Surgery -->
    <g>
      <rect x="1080" y="510" width="104" height="14" rx="7" fill="#31464B"/>
      <rect x="1080" y="510" width="62" height="14" rx="7" fill="#F4C86A"/>
      <text x="1080" y="548" fill="#A7C0BC" font-size="15" font-family="Arial, Helvetica, sans-serif">Gen Surg  59.3%</text>
    </g>

    <!-- Garcia Gen Surgery -->
    <g>
      <rect x="1080" y="568" width="104" height="14" rx="7" fill="#31464B"/>
      <rect x="1080" y="568" width="34" height="14" rx="7" fill="#6BBF8A"/>
      <text x="1080" y="606" fill="#A7C0BC" font-size="15" font-family="Arial, Helvetica, sans-serif">Garcia  31.7%</text>
    </g>

    <!-- Overall -->
    <g>
      <rect x="1080" y="626" width="104" height="14" rx="7" fill="#31464B"/>
      <rect x="1080" y="626" width="66" height="14" rx="7" fill="#607C82"/>
      <text x="1080" y="664" fill="#A7C0BC" font-size="15" font-family="Arial, Helvetica, sans-serif">Overall  63.4%</text>
    </g>
  </g>

  <!-- Floating note -->
  <g filter="url(#shadow)">
    <rect x="964" y="118" width="286" height="112" rx="24" fill="#FFFFFF"/>
    <text x="996" y="160" fill="#213338" font-size="19" font-family="Arial, Helvetica, sans-serif" font-weight="700">
      <tspan x="996" dy="0">Block time clarity</tspan>
      <tspan x="996" dy="20">by service line</tspan>
    </text>
    <text x="996" y="204" fill="#627C82" font-size="16" font-family="Arial, Helvetica, sans-serif">See where time goes unused.</text>
  </g>
</svg>
